            {

                badge: "暫無服務"

            {
                title: "草人脫身",

            {

        const gridContainer = document.getElementById('services-grid');
        
        servicesData.forEach((item, index) => {
            const badgeHtml = item.badge 
                ? `<div class="absolute top-2 right-2 bg-white text-temple-red text-[11px] font-bold px-2 py-0.5 rounded-sm border border-temple-red/30">${item.badge}</div>` 
                : '';
            
            const subtitleHtml = item.subtitle 
                ? `<div class="text-[13px] text-temple-text/60 font-medium mt-1">${item.subtitle}</div>` 
                : '';

            const card = document.createElement('div');
            card.className = "hand-drawn-card p-5 md:p-6 hover:bg-white/60 transition-all duration-300 cursor-pointer flex flex-col items-center justify-center text-center group transform hover:-translate-y-1 relative";
            
            card.addEventListener('click', function() {
                openModal(index);
            });
            
            card.innerHTML = `
                ${badgeHtml}
                <div class="mb-3 transform group-hover:scale-105 transition-transform duration-300 opacity-90 group-hover:opacity-100">

        // ----------------------------------------------------------------------
        // 【4. 標籤切換與 Modal 控制邏輯】
        // ----------------------------------------------------------------------
        function switchTab(tabId) {
            const viewServices = document.getElementById('view-services');
            const viewProducts = document.getElementById('view-products');
            const btnServices = document.getElementById('tab-btn-services');
            const btnProducts = document.getElementById('tab-btn-products');

            if (tabId === 'services') {
                viewServices.classList.remove('hidden');
                setTimeout(() => viewServices.classList.remove('opacity-0'), 50);
                viewProducts.classList.add('opacity-0');
                setTimeout(() => viewProducts.classList.add('hidden'), 300);

                btnServices.className = "px-4 md:px-6 py-1.5 md:py-2 text-sm md:text-base font-bold rounded-full transition-all duration-300 bg-temple-red text-white";
                btnProducts.className = "px-4 md:px-6 py-1.5 md:py-2 text-sm md:text-base font-bold rounded-full transition-all duration-300 text-temple-text/60 hover:text-temple-text";
            } else {
                viewProducts.classList.remove('hidden');
                setTimeout(() => viewProducts.classList.remove('opacity-0'), 50);
                viewServices.classList.add('opacity-0');
                setTimeout(() => viewServices.classList.add('hidden'), 300);

                btnProducts.className = "px-4 md:px-6 py-1.5 md:py-2 text-sm md:text-base font-bold rounded-full transition-all duration-300 bg-[#C18F42] text-white";
                btnServices.className = "px-4 md:px-6 py-1.5 md:py-2 text-sm md:text-base font-bold rounded-full transition-all duration-300 text-temple-text/60 hover:text-temple-text";
            }
        }

        const modal = document.getElementById('detail-modal');
        const modalBox = document.getElementById('modal-content-box');
        
        function openModal(index) {
            if (!servicesData[index]) return;
            
            const data = servicesData[index];
            const subtitleHtml = data.subtitle ? `<span class="text-base text-temple-text/60 ml-2 font-normal">${data.subtitle}</span>` : '';
            
            // 寫入標題與圖示
            document.getElementById('modal-header').innerHTML = `
                <div class="bg-white rounded-full p-2 border border-temple-border shadow-sm flex-shrink-0">${data.icon}</div>
                <h2 class="text-2xl font-bold text-temple-red tracking-wide">${data.title}${subtitleHtml}</h2>
            `;
            
            // 寫入詳細文字內容
            document.getElementById('modal-body').innerHTML = data.desc;

            // 顯示彈出視窗
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modalBox.classList.remove('scale-95');
            modalBox.classList.add('scale-100');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.add('opacity-0', 'pointer-events-none');
            modalBox.classList.remove('scale-100');
            modalBox.classList.add('scale-95');
            document.body.style.overflow = '';
        }
    </script>
